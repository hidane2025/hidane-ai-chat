name: テスト（CI）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 構文チェック + Flask import 健全性
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 全 *.py の構文チェック
        run: |
          find . -name "*.py" -not -path "./.venv/*" -not -path "*/__pycache__/*" \
            | xargs python -m py_compile

      - name: Flask app.py が import できる
        run: |
          python -c "
          import os
          os.environ.setdefault('SECRET_KEY', 'dummy_for_ci')
          os.environ.setdefault('ANTHROPIC_API_KEY', 'dummy_for_ci')
          os.environ.setdefault('DATABASE_URL', 'postgresql://dummy:dummy@localhost/dummy')
          import importlib, sys
          # app.py が DB 接続を要求する場合は import エラーを検出するだけにとどめる
          try:
              import app
              print('✅ app.py import OK')
          except Exception as e:
              print(f'⚠️ app.py import に環境変数が足りない可能性: {type(e).__name__}: {e}')
              # 構文エラーでなければCI自体は通す（実DBが無いCI環境では普通）
              if isinstance(e, SyntaxError):
                  sys.exit(1)
          "
