<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Inner card -->
  <rect x="60" y="50" width="1080" height="530" rx="24" fill="#12122a" stroke="url(#accent)" stroke-width="1.5" opacity="0.7"/>

  <!-- Top decorative line -->
  <rect x="400" y="120" width="400" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Fire icon (SVG path instead of emoji for reliability) -->
  <g transform="translate(460, 170)">
    <path d="M30 0C30 0 36 12 36 24C36 32 30 38 24 38C26 34 24 28 20 24C18 28 14 32 14 38C8 36 4 30 4 24C4 16 12 8 16 4C16 12 20 16 24 12C26 8 28 4 30 0Z" fill="url(#fire)" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text x="600" y="250" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-size="64" font-weight="bold" fill="#ffffff" letter-spacing="4">
    ヒダネ AI社員チャット
  </text>

  <!-- Accent underline below title -->
  <rect x="340" y="270" width="520" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-size="30" fill="#c0c0e0" letter-spacing="2">
    11名のAI社員があなたの業務をサポート
  </text>

  <!-- Description -->
  <text x="600" y="395" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-size="20" fill="#8888aa" letter-spacing="1">
    営業・助成金・SNS・経理・研修設計まで、チームで対応
  </text>

  <!-- Bottom decorative line -->
  <rect x="400" y="470" width="400" height="1" rx="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Company name -->
  <text x="600" y="520" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-size="22" fill="#7070a0" letter-spacing="6">
    株式会社ヒダネ
  </text>

  <!-- Corner accents -->
  <rect x="60" y="50" width="40" height="3" rx="1" fill="url(#accent)"/>
  <rect x="60" y="50" width="3" height="40" rx="1" fill="url(#accent)"/>
  <rect x="1100" y="50" width="40" height="3" rx="1" fill="url(#accent)"/>
  <rect x="1137" y="50" width="3" height="40" rx="1" fill="url(#accent)"/>
  <rect x="60" y="577" width="40" height="3" rx="1" fill="url(#accent)"/>
  <rect x="60" y="540" width="3" height="40" rx="1" fill="url(#accent)"/>
  <rect x="1100" y="577" width="40" height="3" rx="1" fill="url(#accent)"/>
  <rect x="1137" y="540" width="3" height="40" rx="1" fill="url(#accent)"/>
</svg>
