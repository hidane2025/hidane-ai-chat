<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - ヒダネ AI社員チャット</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f14;
            color: #e8e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6C5CE7, #a855f7);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .logo-icon svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
        }
        .logo-title {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }
        .logo-subtitle {
            font-size: 13px;
            color: #8888a0;
        }
        .login-card {
            background-color: #16161e;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 32px;
        }
        .login-card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #c8c8d8;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background-color: #0f0f14;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #e8e8f0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #6C5CE7;
        }
        .form-group input::placeholder {
            color: #555566;
        }
        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 20px;
            color: #f87171;
            font-size: 13px;
            display: none;
        }
        .error-message.visible {
            display: block;
        }
        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #6C5CE7;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .login-button:hover {
            background-color: #5a4bd6;
        }
        .login-button:active {
            transform: scale(0.98);
        }
        .footer-links {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #8888a0;
        }
        .footer-links a {
            color: #6C5CE7;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .footer-links a:hover {
            opacity: 0.8;
        }
        .footer-links span {
            margin: 0 8px;
            color: #3a3a4a;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="logo-section">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
            </div>
            <div class="logo-title">ヒダネ AI社員チャット</div>
            <div class="logo-subtitle">業務を支えるAIパートナー</div>
        </div>

        <div class="login-card">
            <h2>ログイン</h2>

            {% if error %}
            <div class="error-message visible" id="error-message">{{ error }}</div>
            {% else %}
            <div class="error-message" id="error-message"></div>
            {% endif %}

            <form method="POST" action="/auth/login" id="login-form">
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" placeholder="example@company.co.jp" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" name="password" placeholder="パスワードを入力" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-button">ログイン</button>
            </form>
        </div>

        <div class="footer-links">
            <a href="/terms">利用規約</a>
            <span>|</span>
            <a href="/privacy">プライバシーポリシー</a>
        </div>
    </div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var error = params.get('error');
            if (error) {
                var el = document.getElementById('error-message');
                var messages = {
                    'invalid': 'メールアドレスまたはパスワードが正しくありません。',
                    'expired': 'セッションの有効期限が切れました。再度ログインしてください。',
                    'unauthorized': 'ログインが必要です。'
                };
                el.textContent = messages[error] || 'ログインに失敗しました。もう一度お試しください。';
                el.classList.add('visible');
            }
        })();
    </script>
</body>
</html>
